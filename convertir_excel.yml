name: Convertir Excel a JSON

on:
  push:
    paths:
      - 'Evento_Riesgo_Febor.xlsx'  # Se activa solo cuando subes el Excel

jobs:
  convertir:
    runs-on: ubuntu-latest

    steps:
      - name: Descargar repositorio
        uses: actions/checkout@v4

      - name: Instalar Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.11'

      - name: Instalar dependencias
        run: pip install openpyxl

      - name: Convertir Excel a JSON
        run: |
          python3 - <<'PYEOF'
          import openpyxl, json, re

          wb = openpyxl.load_workbook('Evento_Riesgo_Febor.xlsx', data_only=True)

          def normalizar(s):
              return str(s).strip() if s is not None else ''

          def fila_a_dict(headers, row):
              return {headers[i]: normalizar(row[i].value) for i in range(len(headers))}

          resultado = {}

          # ── Hoja Eventos de Riesgos ──
          hoja_e = next((n for n in wb.sheetnames if 'eventos de riesgo' in n.lower()), None)
          if hoja_e:
              ws = wb[hoja_e]
              rows = list(ws.iter_rows())
              headers = [normalizar(c.value) for c in rows[0]]
              datos = []
              for row in rows[1:]:
                  d = fila_a_dict(headers, row)
                  ref = d.get('REFERENCIA','')
                  if ref and ref not in ('','None'):
                      datos.append(d)
              resultado['eventos'] = datos
              print(f'Eventos: {len(datos)} filas')

          # ── Hoja Eventos-Tareas ──
          hoja_t = next((n for n in wb.sheetnames if 'tarea' in n.lower()), None)
          if hoja_t:
              ws = wb[hoja_t]
              rows = list(ws.iter_rows())
              # Buscar fila de encabezado real
              hi = 0
              for i, row in enumerate(rows):
                  vals = [normalizar(c.value).lower() for c in row]
                  if any('tarea' in v or 'descripci' in v or 'tipo' in v for v in vals):
                      hi = i
                      break
              headers = [normalizar(rows[hi][j].value) for j in range(len(rows[hi]))]
              datos = []
              for row in rows[hi+1:]:
                  d = fila_a_dict(headers, row)
                  if any(v not in ('','None') for v in d.values()):
                      datos.append(d)
              resultado['tareas'] = datos
              print(f'Tareas: {len(datos)} filas')

          with open('datos.json', 'w', encoding='utf-8') as f:
              json.dump(resultado, f, ensure_ascii=False, indent=2, default=str)

          print('datos.json generado OK')
          PYEOF

      - name: Subir datos.json al repositorio
        run: |
          git config user.name "github-actions[bot]"
          git config user.email "github-actions[bot]@users.noreply.github.com"
          git add datos.json
          git diff --cached --quiet || git commit -m "Auto: actualizar datos.json desde Excel"
          git push
